<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; padding: 24px; font-family: 'DM Sans', sans-serif; display: flex; gap: 16px; flex-wrap: wrap; }

  .card-dark { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); padding: 24px; width: 200px; }
  .card-light { background: #fff; border: 1px solid rgba(0,0,0,0.08); padding: 24px; width: 200px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .card-project { width: 200px; position: relative; overflow: hidden; }

  .card-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; line-height: 1; }
  .card-body { font-size: 12px; line-height: 1.5; font-weight: 300; }
  .card-footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #a0a0a0; display: flex; justify-content: space-between; }
  .card-footer-light { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.08); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #999; display: flex; justify-content: space-between; }

  .img-placeholder { width: 100%; height: 120px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
  .img-placeholder svg { opacity: 0.2; }
</style>
</head>
<body>
  <!-- Dark card -->
  <div class="card-dark">
    <div class="card-label" style="color:#ccc4bb">Services</div>
    <div class="card-title" style="color:#fff">General Contracting</div>
    <div class="card-body" style="color:#7a7a7a">Full-scope project delivery from groundbreaking to handover.</div>
    <div class="card-footer">
      <span>Commercial</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25L21 12m0 0l-3.75 3.75M21 12H3"/></svg>
    </div>
  </div>

  <!-- Light card -->
  <div class="card-light">
    <div class="card-label" style="color:#999">Work</div>
    <div class="card-title" style="color:#111">Midtown Tower</div>
    <div class="card-body" style="color:#5c5c5c">38-storey commercial development. Delivered on time, under budget.</div>
    <div class="card-footer-light">
      <span>2023</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25L21 12m0 0l-3.75 3.75M21 12H3"/></svg>
    </div>
  </div>

  <!-- Project / image card -->
  <div class="card-project" style="border:1px solid rgba(255,255,255,0.08)">
    <div class="img-placeholder">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div style="padding:16px;background:#1a1a1a">
      <div class="card-label" style="color:#ccc4bb">Residential</div>
      <div class="card-title" style="color:#fff;font-size:20px">Harbour Residences</div>
      <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#555;margin-top:8px">120 Units · 2024</div>
    </div>
  </div>

  <!-- Stat card -->
  <div class="card-dark" style="width:160px;text-align:center;padding:20px">
    <div style="font-family:'Bebas Neue';font-size:56px;color:#fff;letter-spacing:0.06em;line-height:1">25+</div>
    <div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#a0a0a0;margin-top:8px">Years Experience</div>
  </div>
</body>
</html>
