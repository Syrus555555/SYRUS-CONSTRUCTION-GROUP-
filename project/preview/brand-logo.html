<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; }
  .row { display: flex; align-items: center; justify-content: center; padding: 28px 32px; gap: 40px; }
  .dark { background: #111; }
  .light { background: #fff; }
  .mid { background: #f5f5f5; }
  img { display: block; }
  .wordmark { font-family: 'Bebas Neue', sans-serif; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Dark background logo -->
  <div class="row dark">
    <img src="../assets/logo-main.png" alt="Syrus Construction Group" style="height:80px; width:auto; mix-blend-mode:screen;">
    <div style="color:#555; width:1px; height:60px; background:rgba(255,255,255,0.1)"></div>
    <div>
      <div style="font-family:'Bebas Neue';font-size:28px;color:#fff;letter-spacing:0.14em;line-height:1">Syrus</div>
      <div style="font-family:'DM Sans';font-size:9px;color:#a0a0a0;letter-spacing:0.2em;text-transform:uppercase;margin-top:3px">Construction Group</div>
    </div>
  </div>
  <!-- Light background wordmark only -->
  <div class="row light">
    <div>
      <div style="font-family:'Bebas Neue';font-size:36px;color:#111;letter-spacing:0.14em;line-height:1">Syrus</div>
      <div style="font-family:'DM Sans';font-size:9px;color:#999;letter-spacing:0.2em;text-transform:uppercase;margin-top:3px">Construction Group</div>
    </div>
    <div style="width:1px;height:48px;background:#ebebeb"></div>
    <div style="font-family:'DM Sans';font-size:10px;color:#bbb;letter-spacing:0.18em;text-transform:uppercase">25+ Years Experience</div>
  </div>
  <!-- Grey background compact -->
  <div class="row mid">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;background:#111;display:flex;align-items:center;justify-content:center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 9v13h7v-7h6v7h7V9z"/></svg>
      </div>
      <div style="font-family:'Bebas Neue';font-size:20px;color:#111;letter-spacing:0.12em">Syrus Construction Group</div>
    </div>
  </div>
</body>
</html>
