<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; padding: 24px 28px; font-family: 'DM Sans', sans-serif; }
  .row { display: flex; align-items: center; gap: 24px; padding: 10px 0; border-bottom: 1px solid #e8e8e8; }
  .row:last-child { border-bottom: none; }
  .tag { font-size: 9px; color: #bbb; letter-spacing: 0.1em; text-transform: uppercase; width: 80px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="row">
    <div class="tag">label-lg</div>
    <div style="font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#111">Our Services</div>
  </div>
  <div class="row">
    <div class="tag">label</div>
    <div style="font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:#3d3d3d">Case Studies</div>
  </div>
  <div class="row">
    <div class="tag">nav item</div>
    <div style="font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#111">About Us</div>
  </div>
  <div class="row">
    <div class="tag">tag / badge</div>
    <div style="display:inline-flex;align-items:center;gap:6px">
      <span style="font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:#111;padding:3px 10px">Commercial</span>
      <span style="font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#111;border:1px solid #ccc;padding:3px 10px">Residential</span>
    </div>
  </div>
  <div class="row">
    <div class="tag">stat</div>
    <div style="display:flex;gap:32px">
      <div><div style="font-family:'Bebas Neue',sans-serif;font-size:40px;color:#111;letter-spacing:0.06em;line-height:1">25+</div><div style="font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#999;margin-top:4px">Years Experience</div></div>
      <div><div style="font-family:'Bebas Neue',sans-serif;font-size:40px;color:#111;letter-spacing:0.06em;line-height:1">300+</div><div style="font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#999;margin-top:4px">Projects</div></div>
    </div>
  </div>
</body>
</html>
