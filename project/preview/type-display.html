<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; padding: 24px 28px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .row:last-child { border-bottom: none; }
  .size-label { font-family: 'DM Sans', sans-serif; font-size: 9px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; width: 48px; flex-shrink: 0; padding-top: 4px; }
  .specimen { font-family: 'Bebas Neue', sans-serif; color: #fff; letter-spacing: 0.06em; text-transform: uppercase; line-height: 1; }
</style>
</head>
<body>
  <div class="row"><div class="size-label">96px</div><div class="specimen" style="font-size:96px">Build</div></div>
  <div class="row"><div class="size-label">64px</div><div class="specimen" style="font-size:64px">Structure</div></div>
  <div class="row"><div class="size-label">44px</div><div class="specimen" style="font-size:44px">Precision at Every Scale</div></div>
  <div class="row"><div class="size-label">32px</div><div class="specimen" style="font-size:32px">25+ Years of Delivered Excellence</div></div>
  <div class="row"><div class="size-label">24px</div><div class="specimen" style="font-size:24px; letter-spacing:0.12em">Commercial · Residential · Industrial</div></div>
</body>
</html>
