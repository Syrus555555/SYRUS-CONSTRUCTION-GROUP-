<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; font-family: 'DM Sans', sans-serif; padding: 24px; }
  .row { display: flex; gap: 0; }
  .swatch { flex: 1; height: 72px; display: flex; align-items: flex-end; padding: 8px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .meta { font-size: 9px; opacity: 0.6; margin-top: 2px; letter-spacing: 0.04em; }
  .group { margin-bottom: 16px; }
  .group-title { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #555; font-weight: 600; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="group">
  <div class="group-title">Blacks</div>
  <div class="row">
    <div class="swatch" style="background:#0a0a0a; border: 1px solid #222;"><div><div class="label" style="color:#555">950</div><div class="meta" style="color:#555">#0a0a0a</div></div></div>
    <div class="swatch" style="background:#111111;"><div><div class="label" style="color:#555">900</div><div class="meta" style="color:#555">#111111</div></div></div>
    <div class="swatch" style="background:#1a1a1a;"><div><div class="label" style="color:#555">800</div><div class="meta" style="color:#555">#1a1a1a</div></div></div>
    <div class="swatch" style="background:#242424;"><div><div class="label" style="color:#666">700</div><div class="meta" style="color:#666">#242424</div></div></div>
  </div>
</div>
<div class="group">
  <div class="group-title">Dark Greys</div>
  <div class="row">
    <div class="swatch" style="background:#3d3d3d;"><div><div class="label" style="color:#888">600</div><div class="meta" style="color:#888">#3d3d3d</div></div></div>
    <div class="swatch" style="background:#5c5c5c;"><div><div class="label" style="color:#999">500</div><div class="meta" style="color:#999">#5c5c5c</div></div></div>
    <div class="swatch" style="background:#7a7a7a;"><div><div class="label" style="color:#aaa">400</div><div class="meta" style="color:#aaa">#7a7a7a</div></div></div>
    <div class="swatch" style="background:#a0a0a0;"><div><div class="label" style="color:#eee">300</div><div class="meta" style="color:#eee">#a0a0a0</div></div></div>
  </div>
</div>
<div class="group">
  <div class="group-title">Stone Accent</div>
  <div class="row">
    <div class="swatch" style="background:#b5aa9e;"><div><div class="label" style="color:#fff">400</div><div class="meta" style="color:#fff">#b5aa9e</div></div></div>
    <div class="swatch" style="background:#ccc4bb;"><div><div class="label" style="color:#fff">300</div><div class="meta" style="color:#fff">#ccc4bb</div></div></div>
    <div class="swatch" style="background:#e0dbd5;"><div><div class="label" style="color:#888">200</div><div class="meta" style="color:#888">#e0dbd5</div></div></div>
    <div class="swatch" style="background:#f0ece8;"><div><div class="label" style="color:#888">100</div><div class="meta" style="color:#888">#f0ece8</div></div></div>
  </div>
</div>
</body>
</html>
