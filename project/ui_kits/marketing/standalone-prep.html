<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #181818; color: #fff; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* ── TOKENS ── */
  :root {
    --black:   #181818;
    --black-2: #222222;
    --black-3: #2e2e2e;
    --grey-6:  #444444;
    --grey-5:  #666666;
    --grey-4:  #888888;
    --grey-3:  #adadad;
    --grey-2:  #cecece;
    --grey-1:  #e8e8e8;
    --white:   #ffffff;
    --off-white: #f4f4f2;
    --stone:   #ccc4bb;
    --stone-d: #b5aa9e;
    --display: 'Bebas Neue', sans-serif;
    --body:    'DM Sans', sans-serif;
    --max-w:   1280px;
  }

  /* ── GLOBAL ── */
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; font-family: var(--body); border: none; }
  img { display: block; max-width: 100%; }

  /* ── NAV ── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 78px; display: flex; align-items: center;
    padding: 0 48px; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.09);
    background: rgba(30,30,30,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: background 280ms;
  }
  .nav-logo { display: flex; align-items: center; gap: 0; cursor: pointer; }
  .nav-logo-text { display: flex; flex-direction: column; gap: 1px; }
  .nav-logo-mark { height: 44px; width: auto; mix-blend-mode: screen; }
  .nav-logo-text { display: flex; flex-direction: column; gap: 1px; }
  .nav-logo-name { font-family: var(--display); font-size: 22px; letter-spacing: 0.12em; line-height: 1; color: #fff; text-transform: uppercase; }
  .nav-logo-sub { font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--grey-4); }
  .nav-links { display: flex; gap: 36px; align-items: center; }
  .nav-link { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey-3); transition: color 200ms; cursor: pointer; }
  .nav-link:hover, .nav-link.active { color: #fff; }
  .nav-cta { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; background: #fff; color: #111; padding: 11px 22px; transition: background 200ms; }
  .nav-cta:hover { background: var(--grey-1); }

  /* ── SECTION UTILS ── */
  .section { width: 100%; max-width: var(--max-w); margin: 0 auto; padding: 0 48px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--stone); margin-bottom: 20px; }
  .divider { width: 100%; height: 1px; background: rgba(255,255,255,0.07); }
  .divider-light { width: 100%; height: 1px; background: rgba(0,0,0,0.07); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh; background: #1a1a1a;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding-bottom: 80px; position: relative; overflow: hidden;
  }
  .hero-bg { position: absolute; inset: 0; }
  .hero-grid {
    position: absolute; inset: 0; opacity: 0.03; z-index: 1;
    background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .hero-content { position: relative; z-index: 2; }
  .hero-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; color: var(--stone); margin-bottom: 24px; }
  .hero-title { font-family: var(--display); font-size: clamp(72px, 10vw, 140px); line-height: 0.92; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; margin-bottom: 36px; }
  .hero-title span { color: var(--grey-4); }
  .hero-sub { font-size: 16px; font-weight: 300; line-height: 1.7; color: var(--grey-3); max-width: 480px; margin-bottom: 48px; }
  .hero-actions { display: flex; gap: 16px; align-items: center; }
  .btn-primary { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; background: #fff; color: #111; padding: 16px 32px; transition: background 200ms; }
  .btn-primary:hover { background: var(--grey-1); }
  .btn-outline { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.25); padding: 16px 32px; transition: border-color 200ms; }
  .btn-outline:hover { border-color: rgba(255,255,255,0.6); }
  .hero-stats { display: flex; gap: 48px; margin-top: 80px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.07); }
  .hero-stat-n { font-family: var(--display); font-size: 48px; letter-spacing: 0.06em; color: #fff; line-height: 1; }
  .hero-stat-l { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--grey-4); margin-top: 6px; }

  /* ── TICKER ── */
  .ticker { background: #282828; border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06); overflow: hidden; height: 44px; display: flex; align-items: center; }
  .ticker-inner { display: flex; gap: 0; white-space: nowrap; animation: ticker 20s linear infinite; }
  .ticker-item { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--grey-5); padding: 0 48px; display: flex; align-items: center; gap: 16px; }
  .ticker-dot { width: 3px; height: 3px; background: var(--stone); border-radius: 50%; }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ── SERVICES ── */
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(255,255,255,0.07); }
  .service-card { background: #202020; padding: 40px 36px; transition: background 280ms; cursor: pointer; }
  .service-card:hover { background: #2c2c2c; }
  .service-num { font-family: var(--display); font-size: 40px; color: rgba(255,255,255,0.07); letter-spacing: 0.06em; line-height: 1; margin-bottom: 24px; }
  .service-icon { width: 40px; height: 40px; margin-bottom: 20px; color: var(--stone); }
  .service-title { font-family: var(--display); font-size: 28px; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; margin-bottom: 14px; line-height: 1; }
  .service-body { font-size: 13px; font-weight: 300; line-height: 1.7; color: var(--grey-4); }
  .service-link { margin-top: 28px; font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-3); display: flex; align-items: center; gap: 8px; transition: color 200ms; }
  .service-card:hover .service-link { color: #fff; }

  /* ── WORK GRID ── */
  .work-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; }
  .work-card { position: relative; overflow: hidden; cursor: pointer; }
  .work-img { width: 100%; aspect-ratio: 4/3; background: var(--black-2); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .work-img-inner { position: absolute; inset: 0; background: var(--black-3); transition: transform 400ms cubic-bezier(0.25,0,0,1); }
  .work-card:hover .work-img-inner { transform: scale(1.03); }
  .work-img-placeholder { position: relative; z-index: 1; opacity: 0.15; }
  .work-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%); z-index: 2; opacity: 0; transition: opacity 300ms; }
  .work-card:hover .work-overlay { opacity: 1; }
  .work-info { padding: 20px 24px; background: #272727; border-top: 1px solid rgba(255,255,255,0.06); }
  .work-tag { font-size: 9px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--stone); margin-bottom: 6px; }
  .work-title { font-family: var(--display); font-size: 22px; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; line-height: 1; }
  .work-meta { font-size: 10px; color: var(--grey-5); margin-top: 6px; letter-spacing: 0.08em; }

  /* ── VIDEO SECTION ── */
  .video-section { background: #222; position: relative; overflow: hidden; }
  .video-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #1a1a1a; cursor: pointer; overflow: hidden; }
  .video-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.7); }
  .video-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: rgba(0,0,0,0.35); transition: background 300ms; }
  .video-wrap.playing .video-overlay { background: transparent; opacity: 0; }
  .play-btn { width: 72px; height: 72px; border: 2px solid rgba(255,255,255,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 250ms; background: rgba(0,0,0,0.3); }
  .play-btn:hover { background: rgba(255,255,255,0.15); border-color: #fff; transform: scale(1.08); }
  .video-caption { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.6); }

  /* ── FEATURE (light section) ── */
  .feature-strip { background: #f4f4f2; padding: 80px 0; }
  .feature-strip .section { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .feature-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--grey-4); margin-bottom: 20px; }
  .feature-title { font-family: var(--display); font-size: clamp(40px, 5vw, 72px); letter-spacing: 0.05em; text-transform: uppercase; color: #111; line-height: 0.95; margin-bottom: 28px; }
  .feature-body { font-size: 15px; font-weight: 300; line-height: 1.75; color: var(--grey-5); margin-bottom: 36px; }
  .feature-list { display: flex; flex-direction: column; gap: 14px; }
  .feature-item { display: flex; align-items: flex-start; gap: 12px; }
  .feature-check { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; color: #111; }
  .feature-item-text { font-size: 13px; color: #3d3d3d; line-height: 1.5; }
  .feature-visual { background: var(--grey-1); aspect-ratio: 4/5; display: flex; align-items: center; justify-content: center; }

  /* ── ABOUT ── */
  .about-hero { background: var(--black); padding: 140px 0 80px; }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; margin-top: 60px; }
  .about-body { font-size: 16px; font-weight: 300; line-height: 1.8; color: var(--grey-2); }
  .about-body p + p { margin-top: 20px; }
  .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .team-card { background: var(--black-2); }
  .team-photo { width: 100%; aspect-ratio: 3/4; background: var(--black-3); display: flex; align-items: center; justify-content: center; }
  .team-info { padding: 20px; border-top: 1px solid rgba(255,255,255,0.06); }
  .team-name { font-family: var(--display); font-size: 22px; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; }
  .team-role { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--stone); margin-top: 4px; }

  /* ── CONTACT ── */
  .contact-section { background: #1e1e1e; padding: 140px 0 80px; }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-top: 60px; }
  .contact-info { display: flex; flex-direction: column; gap: 36px; }
  .contact-item { display: flex; gap: 20px; }
  .contact-icon { width: 44px; height: 44px; background: var(--black-2); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--stone); }
  .contact-label { font-size: 9px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--grey-5); margin-bottom: 6px; }
  .contact-val { font-size: 14px; color: var(--grey-2); line-height: 1.5; }
  .form-field { margin-bottom: 16px; }
  .form-label { display: block; font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-5); margin-bottom: 8px; }
  .form-input { width: 100%; font-family: var(--body); font-size: 14px; padding: 14px 16px; background: var(--black-2); border: 1px solid rgba(255,255,255,0.1); color: #fff; outline: none; border-radius: 0; transition: border-color 200ms; }
  .form-input:focus { border-color: rgba(255,255,255,0.4); }
  .form-input::placeholder { color: var(--grey-6); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-field { flex: 1; }

  /* ── FOOTER ── */
  .footer { background: #232323; border-top: 1px solid rgba(255,255,255,0.07); padding: 64px 0 40px; }
  .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; }
  .footer-brand-name { font-family: var(--display); font-size: 24px; letter-spacing: 0.12em; color: #fff; text-transform: uppercase; }
  .footer-tagline { font-size: 12px; font-weight: 300; line-height: 1.6; color: var(--grey-5); margin-top: 12px; max-width: 220px; }
  .footer-col-title { font-size: 9px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--grey-5); margin-bottom: 16px; }
  .footer-link { display: block; font-size: 13px; color: var(--grey-4); margin-bottom: 10px; transition: color 200ms; cursor: pointer; }
  .footer-link:hover { color: #fff; }
  .footer-bottom { margin-top: 48px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
  .footer-copy { font-size: 11px; color: var(--grey-6); letter-spacing: 0.06em; }

  /* ── PARTNERS ── */
  .partners-strip { background: var(--black-2); border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 40px 0; }
  .partners-grid { display: flex; gap: 48px; align-items: center; justify-content: center; flex-wrap: wrap; }

  /* ── REAL IMAGES ── */
.real-img { width:100%; height:100%; object-fit:cover; display:block; filter:grayscale(20%); }

/* ── PAGE WRAPPER ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── SECTION PADDING ── */
  .py-lg { padding: 96px 0; }
  .py-xl { padding: 120px 0; }
  .section-title { font-family: var(--display); font-size: clamp(40px, 5vw, 80px); letter-spacing: 0.05em; text-transform: uppercase; color: #fff; line-height: 0.95; margin-bottom: 16px; }
  .section-title.dark { color: #111; }
  .section-sub { font-size: 15px; font-weight: 300; line-height: 1.7; color: var(--grey-4); max-width: 520px; margin-bottom: 56px; }
  .section-sub.dark { color: var(--grey-5); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes scaleIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }

  .reveal { animation: fadeUp 600ms cubic-bezier(0.25,0,0,1) both; }
  .nav { animation: slideDown 500ms cubic-bezier(0.25,0,0,1) both; }

  /* Page fade */
  .page-enter { animation: fadeIn 350ms cubic-bezier(0.25,0,0,1) both; }

  /* Scroll-triggered reveal classes */
  .sr { opacity:0; transform:translateY(36px); transition: opacity 650ms cubic-bezier(0.25,0,0,1), transform 650ms cubic-bezier(0.25,0,0,1); }
  .sr.visible { opacity:1; transform:translateY(0); }
  .sr-delay-1 { transition-delay: 100ms; }
  .sr-delay-2 { transition-delay: 200ms; }
  .sr-delay-3 { transition-delay: 300ms; }
  .sr-delay-4 { transition-delay: 400ms; }
  .sr-scale { opacity:0; transform:scale(0.97); transition: opacity 600ms cubic-bezier(0.25,0,0,1), transform 600ms cubic-bezier(0.25,0,0,1); }
  .sr-scale.visible { opacity:1; transform:scale(1); }

  /* Hover lift on cards */
  .card-lift { transition: transform 300ms cubic-bezier(0.25,0,0,1), box-shadow 300ms; }
  .card-lift:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }

  /* Ticker pause on hover */
  .ticker-inner:hover { animation-play-state: paused; }

  useEffect(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    const els = document.querySelectorAll('.sr, .sr-scale');
    els.forEach(el => observer.observe(el));
    return () => observer.disconnect();
  });
};
